name: CI

on:
  pull_request:
  merge_group:

# Explicit minimum scope. Add `contents: write` (or narrower) only if a job
# needs to push to the repo (e.g., auto-generated coverage badges, lint fixes).
permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evals:
    name: evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 plugins/flow/evals/run_evals.py
      - run: python3 plugins/flow/evals/run_walk_extract_evals.py
      - run: python3 plugins/flow/evals/run_status_docs_evals.py
      - run: python3 plugins/flow/evals/run_visual_history_evals.py
      - run: python3 plugins/flow/evals/run_render_evals.py
      - run: python3 plugins/flow/evals/run_report_render_evals.py
      - run: python3 plugins/flow/evals/run_rigor_marker_evals.py
      - run: python3 plugins/flow/evals/run_contribution_evals.py
      - run: python3 plugins/flow/evals/run_land_evals.py

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 plugins/flow/evals/run_security_evals.py
